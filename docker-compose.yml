version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fragpulse_postgres
    environment:
      POSTGRES_USER: fragpulse_user
      POSTGRES_PASSWORD: fragpulse_password
      POSTGRES_DB: fragpulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - fragpulse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fragpulse_user -d fragpulse_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fragpulse_backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=fragpulse_user
      - DB_PASSWORD=fragpulse_password
      - DB_NAME=fragpulse_db
      - DB_SSLMODE=disable
      - CORS_ALLOWED_ORIGINS=*
    volumes:
      - ./migrations:/root/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fragpulse_network

volumes:
  postgres_data:

networks:
  fragpulse_network:
    driver: bridge